const DEFAULT_RESOURCES = [{"id":1773330282524,"title":"AGD Asistentes gerontológicos a domicilio GCABA","codigo":"","description":"MAIL Y TAD: Primero se sube a TAD. Se envía Mail a asesoriaintegraldecuidados@buenosaires.gob.ar \\ny se envia con denuncia e informes y carátula TAD también.\\n\\nEl servicio de Asistencia Gerontológica Domiciliaria ofrece atención domiciliaria gratuita para personas\\nmayores en situación de vulnerabilidad socioeconómica, residentes en la Ciudad, donde técnicos\\ncapacitados y acreditados por la Secretaria de Bienestar Integral, brindan horas de asistencia\\ngerontológica en el domicilio del beneficiario.\\nLos servicios se renuevan anualmente, previa evaluación realizada por el equipo interdisciplinario del\\nprograma.\\nLos objetivos son facilitar la realización de las actividades básicas habituales que la persona mayor no\\npueda realizar por sí solo, respetando su capacidad de decisión; Promover cambios conductuales que\\nsostengan la autonomía y mejoren la calidad de vida de las personas mayores; Facilitar el desarrollo de\\nactividades sociales estimulando la comunicación con los miembros de la familia, amigos y vecinos.\\nIdentificar, evaluar, acreditar y actualizar un equipo de técnicos gerontológicos con idoneidad y\\ncapacidad para llevar adelante las acciones de la atención al adulto mayor.","generalTags":["vg","pm"],"specificTags":[],"createdAt":"2026-03-12"},{"id":1773330193934,"title":"HOGARES GCABA para PM","codigo":"","description":"El mail es uiadmisionprogramas@gmail.com\\nRequisitos traer los estudios que les solicitan\\nEllos tienen las órdenes médicas para que retiren\\nlunes a viernes de 9 a 15\\nCABA:\\n Hogar San Martín\\nDirección: Av. Warnes 2650, Paternal, CABA.\\nTeléfonos: 4523-9868 / 9878 / 9892\\n• Hogar Rawson\\nDirección: Av. Amancio Alcorta 1402, Barracas, CABA.\\nTeléfonos: 4305-2636 / 4676\\n\\nRequisitos\\n• Cumplir, conforme a la valoración integral del Equipo Interdisciplinario del Área Admisión de la Dirección General de Políticas Asistenciales para Personas Mayores de la Secretaría de Bienestar Integral , con los indicadores exigidos para el ingreso en el Centro Residencial. El mismo contempla las siguientes variables: situación socio-familiar, situación de incapacidad física y psíquica, situación económica, vivienda, reagrupamiento familiar e integración en la comunidad, edad y evaluación de otras circunstancias.\\n• Tener domicilio en la Ciudad Autónoma de Buenos Aires o justificar su residencia en ella durante los dos últimos años, por cualquier medio fehaciente.\\n• Ser mayor de 60 años.\\n• No poseer obra social o de salud que cubra la prestación de internación geriátrica, en forma directa o mediante subsidio, exceptuándose los casos en que exista un convenio de la misma con el Gobierno de la Ciudad Autónoma de Buenos Aires.\\n• Carecer de una red familiar o social continente que resulte obligada a darle asistencia y cuidado para realizar las actividades de la vida diaria de manera tal que la persona mayor pueda desenvolverse de manera digna y satisfactoria.\\n• Carecer de bienes propios y de ingresos económicos suficientes para su supervivencia. En el caso de que percibieran haberes previsionales de cualquier modalidad o tuvieran asignada pensión o dinero del exterior, o poseyeran un bien que produjera alguna rentabilidad, el monto total de ingresos por todo concepto no podrá superar el valor expresado en pesos de la medición actualizada de la línea de indigencia.\\n• No poseer vivienda.\\n• No padecer trastornos mentales o de conducta que produzcan problemas de integración social.\\nHogares de Residencia Permanente\\nLos hogares de residencia permanente Son alojamiento de puertas abiertas y atención integral para\\nPersonas Mayores. Se atienden las necesidades cotidianas del adulto mayor en forma integral y\\ncontinua, promoviendo e incrementando la calidad de vida y evitando situaciones de marginación y\\nexclusión social.\\nSe requiere del consentimiento de la persona mayor a ser alojada y el compromiso de sus familiares de\\ncolaborar en el bienestar del adulto mayor y participar con la institución que brinda la prestación.\\nLos Servicios prestados son: Alojamiento, alimentación, atención kinesiológica, psicológica y\\nodontológica, y servicio de enfermería las 24 horas. Atención de la situación social y familiar de los\\nresidentes. Talleres de recuperación de la lectura y la escritura. Actividades recreativas, culturales o\\nlabores terapéuticas y salidas recreativas","generalTags":["vg","pm"],"specificTags":[],"createdAt":"2026-03-12"},{"id":1773328593115,"title":"AGD- Asistencia Geróntologica Domiciliaria GCABA","codigo":"","description":"Asistencia Geróntologica Domiciliaria COMPLETAR","generalTags":[],"specificTags":[],"createdAt":"2026-03-12"},{"id":1773326527599,"title":"SUBSIDIO VIVIR EN CASA","codigo":"C2","description":"SUBSIDIO VIVIR EN CASA (a marzo 2026: $10.000 a $140.000):\\n\\nTener en cuenta: va a tener que ir la PM por lo menos dos veces: a entrevista con ellos, y luego a buscar a Corrientes y Larrea Bco. Ciudad la tarjeta de cobro la primera vez. \\nLuego todos los meses el recibo del hotel o lo que sea hay que llevarlo al programa pero puede ir otra persona.\\nPuede ser que si son dos PM viviendo juntos/as, le den a cada uno 100 por ej. También si luego no alcanza que se piense en amparo con Defensoria del Pueblo CABA.\\nRequisitos a presentar:\\nDe la persona: DNI, último recibo de haberes, certificado de domicilio.\\nDe la propiedad: factura/recibo de alquiler con detalles, expensas y servicios.\\nDel propietario: ABL, DNI.\\n\\nDocs en PDF individuales. Instancias: 1) Presentación de documentación. 2) Entrevista en Belgrano 858.\\n\\nCobro: Banco Ciudad (sucursal Corrientes y Larrea). Rendición mensual en Belgrano 858 desde 7 días hábiles del cobro.","generalTags":["vg","pm"],"specificTags":["subsidio","habitacional"],"createdAt":"2026-03-12"},{"id":1,"codigo":"A1","title":"Policía – UCAV (Unidad Central de Asistencia a la Víctima)","description":"Atención 365 días las 24hs. \\nSede en Charcas. Tienen médico legista. Equipo interdisciplinario: psicólogas/os, TS y abogados/as. \\nTambién hacen informes socioambientales para fuero civil o penal a pedido por oficio (presencial o virtual).\\n\\nPara acompañamientos a EDID (Género/Protección Familiar): judicial.supergenero@gmail.com","generalTags":["vg","disc","pm"],"specificTags":["urgente","24hs","interdisciplinario","psicológico","legal","informe socioambiental"],"createdAt":"2026-01-01"},{"id":2,"codigo":"A2","title":"Botón Antipánico – Central de Alarmas","description":"Tel: 4309-9849. Entregas: 5789-8949 (pedir sector de entregas). En la mayoría de los casos instalan una APP.\\n\\n⚠️ La APP sigue funcionando hasta que la Central reciba oficio de fiscalía dando de baja la medida.\\n\\nPara entrega en domicilio: la fiscalía debe pedirlo por oficio. Si no, desde EDID se manda informe a ASM (Guille) para gestionar con la policía.\\n\\nPUNTOS DE ENTREGA:\\n• Sede Central Guzmán 396: 24hs, con turno y demanda espontánea.\\n• Tribunales (Plaza Lavalle): Lun-Vie 10-17hs. Solo con turno y OVD.\\n• Villa Lugano (Av Roca 5252): Lun-Vie 09-15hs.\\n• La Boca (Av. Pedro de Mendoza 2689): Lun-Vie 09-16hs.\\n• Parque Patricios (Zavaleta 425): Lun-Vie 08-15hs.\\n• Charcas 2850 (Sup. VFG): Lun-Vie 10-17hs.\\n\\nASM - Guille: seguimientodemedidas@fiscalias.gob.ar — para entregas en domicilio, reposición de equipo/cargador, eventos SOS.","generalTags":["vg","disc","pm"],"specificTags":["urgente","medida de protección","domicilio","app","24hs"],"createdAt":"2026-01-01"},{"id":3,"codigo":"A3","title":"CJM – Centros de Justicia de la Mujer","description":"Coordinadora Elisa Betzel\\nmail: cjm@jusbaires.gob.ar   para pedir IDR o consultas.\\nToman denuncias. Tienen policía, botón antipánico, MPT. Equipo interdisciplinario.\\ntienen tres programas (https://cjmujer.gob.ar/programas/)\\n- Programa para la Atención de Derechos de las Personas con Discapacidad.\\n- Programa de Prevención de Noviazgos Violentos (con encuentros)\\n- Programa de Acceso a Derechos para Personas Travestis, Transexuales y/o Transgénero \\n\\nSEDES:\\n• Caballito – Yerbal 31: 8-20hs. Salita exclusiva para niños/as con cuidadora.\\n• La Boca – Av. Pedro de Mendoza 2689: Lun-Vie 9-18hs.\\n• Microcentro – Av. de Mayo 654: Lun-Vie 9-18hs.\\n• Lugano – Av. Coronel Roca 5252: Lun-Vie 9-14hs.\\n• Flores – Av. Rivadavia 7202: Lun-Vie 9-14hs.\\n• Defensoría del Pueblo – Av. Belgrano 673: Lun/Mié/Vie 10-16hs.\\n• Villa 21-24 – Pasaje Río Cuarto 3331: Mar y Jue 10-13hs.\\n• Barrio Ricciardelli – Parr. Madre del Pueblo, Manzana 3, Casa 1: Mié 10-13hs.","generalTags":["vg","disc","pm"],"specificTags":["denuncia","interdisciplinario","niños/as"],"createdAt":"2026-01-01"},{"id":4,"codigo":"A4","title":"DGM – CIMS (Dirección General de la Mujer)","description":"Derivación por TAD. Se arma el word modelo de CIMs, se envia por Correo a MARIAN y ella lo pasa a PDF lo  junta con la denuncia e informes existentes, ese pdf se lo manda a la referente y ella lo sube a TAD.\\nSe carga en Kiwi derivación Psicológica. \\n\\nHay un word en el drive con el listado de CIMS actualizado","generalTags":["vg","disc","pm"],"specificTags":["derivación","TAD","habitacional","civil","patrocinio","legal","psicológico"],"createdAt":"2026-01-01"},{"id":5,"codigo":"A5a","title":"Patrocinio Civil – Procuración General CABA","description":"Contacto: Mabel Grela (mgrela@buenosaires.gob.ar) y Paula Juárez (pjuarez@buenosaires.gob.ar).\\nSede: Uruguay 432, CABA. Tel: 43239200 int. 7521/7522/7610. Lun-Vie 10-13hs. NO VAN A DOMICILIO\\nDerivación: Mariana manda mail (referente arma el mail, tiene que tener los datos de la persona y que quiere, por ej renovar medidas)\\n\\nSUPUESTO 1 – Expediente civil por VIOLENCIA FAMILIAR: Solo requiere domicilio en CABA. Sin requisito económico.\\n\\nSUPUESTO 2 – Otras causas civiles/familiares (alimentos, régimen comunicacional, resp. parental, desalojo, etc.): Requisitos: ingresos ≤ 2 SMVM, propiedad ≤ $160.000, automotor > 12 años.\\n\\n🚨 URGENTE: Llamar directo a Mabel Grela al 15-3191-4398.","generalTags":["vg","disc","pm"],"specificTags":["legal","patrocinio","civil","alimentos","gratuito","violencia familiar"],"createdAt":"2026-01-01"},{"id":6,"codigo":"A5b","title":"Patrocinio Civil y Penal – Defensoría del Pueblo CABA","description":"Contacto: Alessandra Cutulli (1144121565). Derivación: accesoajusticiaygv@defensoria.org.ar.\\nAhi Mariana manda el mail derivando y habla con Alessandra para avisarle.\\n\\nConsejo DDHH: consejoddhh@defensoria.org.ar. Tels: 1522428147 / 1522428633 / 0800 999 3722.\\nLun-Vie 10-17hs. Venezuela 538.\\n\\nPROGRAMA VIOLENCIA DE GÉNERO (civil y penal): Para todas las mujeres víctimas de violencia de CABA.\\n\\nPROGRAMA GRUPOS VULNERABLES (civil): Para habitantes de villas, conventillos, asentamientos, hoteles.\\n\\nBarrio Padre Mujica (Punto Violeta): Jueves – turno al 11-3147-7014.","generalTags":["vg","disc","pm"],"specificTags":["legal","patrocinio","civil","penal","grupos vulnerables","gratuito"],"createdAt":"2026-01-01"},{"id":7,"codigo":"A5c","title":"Patrocinio Civil – Defensoría de la Nación (Letrados Móviles)","description":"La persona debe llamar o presentarse directamente (es requisito). Mariana manda mail por formalidad.\\nAsesoran y patrocinan. En bienes solo asesoran. Hacen divorcio (sin parte patrimonial).\\n\\nHorario: 7:30-13:30hs. Bartolomé Mitre 648.\\n\\nUnidad 1: 7090-4981 / ulmcivil1@mpd.gov.ar\\nUnidad 2: 7090-4982 / ulmcivil2@mpd.gov.ar\\nUnidad 3: 7090-4983 / ulmcivil3@mpd.gov.ar\\nUnidad 4: 7090-4984 / ulmcivil4@mpd.gov.ar\\n\\n⚠️ Ver turnos publicados por año para saber a qué unidad derivar.","generalTags":[],"specificTags":["legal","patrocinio","civil","divorcio","gratuito"],"createdAt":"2026-01-01"},{"id":8,"codigo":"A5d","title":"Patrocinio Civil – CPACF (Colegio Público de Abogados CABA)","description":"Tel: 4379-8700 int. 249. Mail: cons.juridico@cpacf.org.ar. Mar/Mié/Jue 9-13hs (por orden de llegada y cupo).\\n\\nTemas: violencia familiar, alimentos, régimen de comunicación parental, cuidado personal, guarda, rectificación de partidas, divorcios.\\n\\nCriterio económico: hasta 2 SMVM. Asesoran a todas y luego se evalúa.","generalTags":["vg","disc","pm"],"specificTags":["legal","patrocinio","civil","alimentos","divorcio","gratuito"],"createdAt":"2026-01-01"},{"id":9,"codigo":"A5e","title":"Patrocinio Penal – Ministerio de Justicia CABA (Hospital de Derechos)","description":"Sede: Av. Rivadavia 2690 (Hospital de Derechos).\\nDerivación: Mariana envía mail a patrocinio.victimas@buenosaires.gob.ar con: Nº de caso, fiscalía interviniente, delito, nombre/apellido/DNI, teléfono.\\nEn casos URGENTES se podrá llamar directamente al referente del área,EUGENIA GAUBECA que es la GERENTA Operativa (2025/2026) , para lograr celeridad en la intervención SIEMPRE JUSTIFICANDO EL PEDIDO, al cel: 1141901967 (celu de la gerenta operativa Gaubeca)\\nM. Eugenia Gaubeca Molina\\nGerente Operativa - Patrocinio Jurídico Penal Gratuito para Víctimas\\n\"Eugenia Gaubeca\" <eugenia.patrocinio.ssjus@gmail.com>\\n\\n\\n⭐ VIOLENCIA DE GÉNERO: SIN REQUISITO ECONÓMICO para cualquier delito.\\nSIN REQUISITO ECONÓMICO: delitos contra la vida, libertad (incl. amenazas) o integridad sexual.\\nCON REQUISITO ECONÓMICO: otros delitos → ingresos ≤ 2 SMVM.\\n\\nHorarios: Mar/Mié/Vie 13-15hs (Hospital de Derechos); Lun/Jue 16-18hs (Charcas).\\n\\n🚨 URGENTE: Eugenia Gaubeca – 1141901967 / eugenia.patrocinio.ssjus@gmail.com","generalTags":["vg","disc","pm"],"specificTags":["legal","patrocinio","penal","amenazas","querella","gratuito"],"createdAt":"2026-01-01"},{"id":10,"codigo":"A6","title":"Ayuda Económica de Emergencia (Res. FG 311/18)","description":"Para gastos urgentes que no pueden ser afrontados por otros organismos. Carácter excepcional y limitado a lo indispensable.\\n\\nDocumentación: Formulario PDF interactivo + Dictamen LU + Recibo. Si es traslado: ticket o recibo de remise/similar.\\n\\nGRUPOS PRIORITARIOS: niños/as, personas mayores, mujeres con hijos menores, personas con discapacidad, enfermedades graves, situación de calle.\\n\\nCubre: habitación, alimentación, vestimenta, medicación, transporte urgente.","generalTags":["vg","disc","pm"],"specificTags":["urgente","económico","habitacional"],"createdAt":"2026-01-01"},{"id":11,"codigo":"A7","title":"Turnos Médicos en Hospitales","description":"Mariana carga el pedido en la planilla con los datos requeridos:\\nNombre y apellido, DNI, Celular, dirección, barrio, fecha de nacimiento, diagnostico si hay, orden si hay, tipo de consulta, hospital.\\nAhí aparece si fue dado el turno y también en el chat de Coordinación de Turnos por WhatsApp.\\n\\nPlanilla: https://docs.google.com/spreadsheets/d/1XeT8Ifas6LxoOEa6icCOzUnJjeOa0hMWeQ2cJnWxTW8/\\n\\nContacto Florencia (gerenta): por WhatsApp en el chat de coordinación.","generalTags":["disc","pm"],"specificTags":["salud","médico","turno","violencia familiar","asistencia social","psicológico"],"createdAt":"2026-01-01"},{"id":12,"codigo":"A8","title":"Vacantes Escolares y Centros de Primera Infancia (CPI)","description":"VACANTES ESCOLARES: Pedido por TAD.\\n\\nCPI – Ministerio de Desarrollo Humano y Hábitat:\\nMail: cpi@buenosaires.gob.ar\\nDirectora: mariadelosangelesfava@gmail.com\\nGerenta operativa: Valeria Lista – Vmlista@buenosaires.gob.ar / +54 9 11 2387-5869\\n\\nMariana se contacta por chat con Valeria, que generalmente pide mail. Puede complementarse subiendo a TAD.","generalTags":["vg","disc","pm"],"specificTags":["educación","niños/as","primera infancia","TAD"],"createdAt":"2026-01-01"},{"id":13,"codigo":"A9a","title":"Subsidio Habitacional – Violencia de Género (DGM / CIM)","description":"Tel coordinación del programa: 43072540.\\n\\nRequisitos: El informe social firmado por TS puede ser del MPF. Residencia en CABA de 2 años. Negativa ANSES.\\n\\nEl CIM tambié const MANAGER_PASSWORD = "admin123";

// ─── helpers localStorage ─────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ─── COMPONENTES ─────────────────────────────────────────────────────────────

function GenTag({ tag, small }) {
  return <span style={{ display:"inline-flex", alignItems:"center", padding: small?"2px 9px":"3px 12px", borderRadius:999, fontSize: small?11:12.5, fontWeight:700, background:tag.bg, color:tag.color, border:`1.5px solid ${tag.color}40`, whiteSpace:"nowrap" }}>{tag.label}</span>;
}

function SpecTag({ label, small }) {
  return <span style={{ display:"inline-flex", padding: small?"1px 8px":"2px 10px", borderRadius:999, fontSize: small?10.5:11.5, fontWeight:500, background:"#f1f5f9", color:"#475569", border:"1px solid #cbd5e1", whiteSpace:"nowrap" }}>{label}</span>;
}

function ResourceCard({ r, generalTagDefs, isManager, onEdit, onDelete }) {
  const [expanded, setExpanded] = useState(false);
  const isLong = r.description.length > 320;
  const preview = isLong && !expanded ? r.description.slice(0, 310) + "…" : r.description;
  const accentDef = generalTagDefs.find(t => r.generalTags.includes(t.id));
  const accent = accentDef ? accentDef.color : "#1e3a5f";

  return (
    <div style={{ background:"#fff", border:"1px solid #e2eaf3", borderLeft:`4px solid ${accent}`, borderRadius:12, padding:"15px 18px", display:"flex", flexDirection:"column", gap:9, boxShadow:"0 1px 5px rgba(15,30,60,0.05)" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
        <span style={{ fontSize:11, fontWeight:700, color:"#94a3b8", background:"#f8fafc", padding:"2px 8px", borderRadius:6, fontFamily:"monospace", border:"1px solid #e2e8f0" }}>{r.codigo}</span>
        {isManager && (
          <div style={{ display:"flex", gap:5 }}>
            <button onClick={() => onEdit(r)} style={{ background:"#eff6ff", border:"none", borderRadius:7, padding:"4px 8px", cursor:"pointer", fontSize:12, color:"#2563eb" }}>✏️</button>
            <button onClick={() => onDelete(r.id)} style={{ background:"#fef2f2", border:"none", borderRadius:7, padding:"4px 8px", cursor:"pointer", fontSize:12, color:"#dc2626" }}>🗑️</button>
          </div>
        )}
      </div>
      <h3 style={{ margin:0, fontSize:15, fontWeight:700, color:"#0f1e3c", lineHeight:1.35 }}>{r.title}</h3>
      {r.generalTags.length > 0 && (
        <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
          {r.generalTags.map(gid => { const def = generalTagDefs.find(t => t.id === gid); return def ? <GenTag key={gid} tag={def} small /> : null; })}
        </div>
      )}
      <pre style={{ margin:0, fontSize:13, color:"#374151", lineHeight:1.65 }}>{preview}</pre>
      {isLong && <button onClick={() => setExpanded(!expanded)} style={{ alignSelf:"flex-start", background:"none", border:"none", color:"#2563eb", cursor:"pointer", fontSize:12, fontWeight:700, padding:0 }}>{expanded ? "▲ Ver menos" : "▼ Ver más"}</button>}
      {r.specificTags.length > 0 && (
        <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginTop:2 }}>
          {r.specificTags.map(t => <SpecTag key={t} label={t} small />)}
        </div>
      )}
    </div>
  );
}

function ResourceForm({ initial, onSave, onCancel, generalTagDefs, specificTagPool }) {
  const [title, setTitle] = useState(initial?.title || "");
  const [codigo, setCodigo] = useState(initial?.codigo || "");
  const [description, setDescription] = useState(initial?.description || "");
  const [selGeneral, setSelGeneral] = useState(initial?.generalTags || []);
  const [selSpecific, setSelSpecific] = useState(initial?.specificTags || []);
  const [customTag, setCustomTag] = useState("");
  const [error, setError] = useState("");

  const toggleGen = id => setSelGeneral(p => p.includes(id) ? p.filter(x => x!==id) : [...p, id]);
  const toggleSpec = tag => setSelSpecific(p => p.includes(tag) ? p.filter(x => x!==tag) : [...p, tag]);
  const addCustom = () => { const t = customTag.trim().toLowerCase(); if(t && !selSpecific.includes(t)) setSelSpecific(p => [...p, t]); setCustomTag(""); };

  const submit = () => {
    if(!title.trim() || !description.trim()) { setError("Título y descripción son obligatorios."); return; }
    onSave({ title:title.trim(), codigo:codigo.trim(), description:description.trim(), generalTags:selGeneral, specificTags:selSpecific });
  };

  const inp = { width:"100%", padding:"9px 13px", borderRadius:9, border:"1.5px solid #cbd5e1", fontSize:13.5, color:"#0f1e3c", background:"#f8fafc", outline:"none" };
  const Lbl = ({c}) => <label style={{ display:"block", fontSize:11, fontWeight:700, color:"#475569", marginBottom:5, letterSpacing:"0.04em", textTransform:"uppercase" }}>{c}</label>;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      <div style={{ display:"grid", gridTemplateColumns:"90px 1fr", gap:10 }}>
        <div><Lbl c="Código"/><input value={codigo} onChange={e=>setCodigo(e.target.value)} placeholder="A1…" style={inp}/></div>
        <div><Lbl c="Título *"/><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Nombre del recurso" style={inp}/></div>
      </div>
      <div><Lbl c="Descripción *"/><textarea value={description} onChange={e=>setDescription(e.target.value)} rows={6} placeholder="Detalle: contacto, horarios, requisitos, cómo derivar…" style={inp}/></div>

      <div style={{ background:"#fafafa", border:"1px solid #e2e8f0", borderRadius:10, padding:"12px 14px" }}>
        <Lbl c="Categorías generales (seleccioná las que apliquen)"/>
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:4 }}>
          {generalTagDefs.map(tag => {
            const active = selGeneral.includes(tag.id);
            return <button key={tag.id} onClick={() => toggleGen(tag.id)} style={{ padding:"5px 15px", borderRadius:999, fontSize:13, fontWeight:700, cursor:"pointer", border:`2px solid ${tag.color}`, background: active ? tag.color : "#fff", color: active ? "#fff" : tag.color, transition:"all 0.15s" }}>{active?"✓ ":""}{tag.label}</button>;
          })}
        </div>
      </div>

      <div style={{ background:"#fafafa", border:"1px solid #e2e8f0", borderRadius:10, padding:"12px 14px" }}>
        <Lbl c="Etiquetas específicas"/>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:10 }}>
          {specificTagPool.map(tag => {
            const active = selSpecific.includes(tag);
            return <span key={tag} onClick={() => toggleSpec(tag)} style={{ padding:"3px 10px", borderRadius:999, fontSize:12, fontWeight:600, cursor:"pointer", userSelect:"none", background: active?"#1e3a5f":"#e2e8f0", color: active?"#fff":"#475569", border: active?"none":"1px solid #cbd5e1", transition:"all 0.15s" }}>{active?"✓ ":""}{tag}</span>;
          })}
        </div>
        <div style={{ display:"flex", gap:7 }}>
          <input value={customTag} onChange={e=>setCustomTag(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustom()} placeholder="Agregar etiqueta nueva…" style={{ ...inp, flex:1, fontSize:13, padding:"7px 12px" }}/>
          <button onClick={addCustom} style={{ padding:"7px 14px", borderRadius:9, border:"none", background:"#1e3a5f", color:"#fff", cursor:"pointer", fontSize:13, fontWeight:700, flexShrink:0 }}>+ Agregar</button>
        </div>
        {selSpecific.length > 0 && (
          <div style={{ marginTop:10 }}>
            <p style={{ margin:"0 0 5px", fontSize:11, color:"#64748b", fontWeight:600 }}>Seleccionadas:</p>
            <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
              {selSpecific.map(t => <span key={t} onClick={() => toggleSpec(t)} style={{ padding:"2px 10px", borderRadius:999, fontSize:11.5, fontWeight:600, background:"#1e3a5f", color:"#fff", cursor:"pointer" }}>{t} ✕</span>)}
            </div>
          </div>
        )}
      </div>

      {error && <p style={{ color:"#dc2626", fontSize:13, margin:0 }}>{error}</p>}
      <div style={{ display:"flex", gap:9, justifyContent:"flex-end" }}>
        <button onClick={onCancel} style={{ padding:"8px 18px", borderRadius:9, border:"1.5px solid #cbd5e1", background:"#fff", color:"#475569", cursor:"pointer", fontSize:13.5, fontWeight:600 }}>Cancelar</button>
        <button onClick={submit} style={{ padding:"8px 22px", borderRadius:9, border:"none", background:"#1e3a5f", color:"#fff", cursor:"pointer", fontSize:13.5, fontWeight:700 }}>{initial ? "Guardar cambios" : "Agregar recurso"}</button>
      </div>
    </div>
  );
}

function TagManager({ generalTagDefs, setGeneralTagDefs, specificTagPool, setSpecificTagPool, onClose }) {
  const [newGenLabel, setNewGenLabel] = useState("");
  const [newGenColor, setNewGenColor] = useState("#0f766e");
  const [newSpec, setNewSpec] = useState("");
  const COLORS = ["#be185d","#5b21b6","#9a3412","#0f766e","#1d4ed8","#b45309","#065f46","#7c3aed","#0369a1","#9f1239"];

  const addGen = () => { const l = newGenLabel.trim(); if(!l) return; const id = l.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now(); setGeneralTagDefs(p => [...p, {id, label:l, color:newGenColor, bg:newGenColor+"20"}]); setNewGenLabel(""); };
  const addSpec = () => { const t = newSpec.trim().toLowerCase(); if(t && !specificTagPool.includes(t)) setSpecificTagPool(p => [...p, t].sort()); setNewSpec(""); };
  const inp = { padding:"8px 12px", borderRadius:9, border:"1.5px solid #cbd5e1", fontSize:13, color:"#0f1e3c", background:"#f8fafc", outline:"none" };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
      <div>
        <p style={{ margin:"0 0 10px", fontSize:12, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.05em" }}>Categorías generales</p>
        <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
          {generalTagDefs.map(tag => (
            <div key={tag.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"7px 12px", borderRadius:9, background:tag.bg, border:`1px solid ${tag.color}30` }}>
              <span style={{ fontWeight:700, fontSize:13.5, color:tag.color }}>{tag.label}</span>
              <button onClick={() => setGeneralTagDefs(p => p.filter(t => t.id!==tag.id))} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14, color:"#94a3b8", fontWeight:700 }}>✕</button>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:7, marginTop:10, flexWrap:"wrap", alignItems:"center" }}>
          <input value={newGenLabel} onChange={e=>setNewGenLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addGen()} placeholder="Nueva categoría…" style={{ ...inp, flex:1, minWidth:130 }}/>
          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
            {COLORS.map(c => <button key={c} onClick={() => setNewGenColor(c)} style={{ width:22, height:22, borderRadius:"50%", background:c, border: newGenColor===c?"3px solid #0f1e3c":"2px solid #fff", cursor:"pointer", boxShadow:"0 0 0 1px #cbd5e1" }}/>)}
          </div>
          <button onClick={addGen} style={{ padding:"7px 14px", borderRadius:9, border:"none", background:newGenColor, color:"#fff", cursor:"pointer", fontSize:13, fontWeight:700 }}>+ Agregar</button>
        </div>
      </div>
      <hr style={{ border:"none", borderTop:"1px solid #e2e8f0", margin:0 }}/>
      <div>
        <p style={{ margin:"0 0 10px", fontSize:12, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.05em" }}>Etiquetas específicas disponibles</p>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6, maxHeight:180, overflowY:"auto", padding:"4px 0" }}>
          {specificTagPool.map(tag => (
            <span key={tag} style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"3px 10px", borderRadius:999, fontSize:12, fontWeight:600, background:"#f1f5f9", color:"#475569", border:"1px solid #cbd5e1" }}>
              {tag}
              <button onClick={() => setSpecificTagPool(p => p.filter(t=>t!==tag))} style={{ background:"none", border:"none", cursor:"pointer", color:"#94a3b8", fontSize:11, padding:0, fontWeight:700 }}>✕</button>
            </span>
          ))}
        </div>
        <div style={{ display:"flex", gap:7, marginTop:10 }}>
          <input value={newSpec} onChange={e=>setNewSpec(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSpec()} placeholder="Nueva etiqueta específica…" style={{ ...inp, flex:1 }}/>
          <button onClick={addSpec} style={{ padding:"7px 14px", borderRadius:9, border:"none", background:"#1e3a5f", color:"#fff", cursor:"pointer", fontSize:13, fontWeight:700 }}>+ Agregar</button>
        </div>
      </div>
      <button onClick={onClose} style={{ padding:"9px", borderRadius:9, border:"none", background:"#f1f5f9", color:"#475569", cursor:"pointer", fontSize:13.5, fontWeight:700 }}>Cerrar</button>
    </div>
  );
}

function Modal({ children, onClose, wide }) {
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(5,15,40,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:16 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:16, padding:"26px", maxWidth: wide?580:420, width:"100%", boxShadow:"0 12px 50px rgba(0,0,0,0.2)", maxHeight:"90vh", overflowY:"auto" }}>
        {children}
      </div>
    </div>
  );
}

// ─── APP PRINCIPAL ────────────────────────────────────────────────────────────
function App() {
  const [resources, setResources]           = useState(() => load("edid_resources", DEFAULT_RESOURCES));
  const [generalTagDefs, setGeneralTagDefs] = useState(() => load("edid_generalTags", DEFAULT_GENERAL_TAGS));
  const [specificTagPool, setSpecificTagPool] = useState(() => load("edid_specificTags", DEFAULT_SPECIFIC_TAGS));

  const [isManager, setIsManager]     = useState(false);
  const [showForm, setShowForm]       = useState(false);
  const [editingRes, setEditingRes]   = useState(null);
  const [showTagMgr, setShowTagMgr]   = useState(false);
  const [filterGeneral, setFilterGeneral] = useState(null);
  const [filterSpecific, setFilterSpecific] = useState([]);
  const [search, setSearch]           = useState("");
  const [confirmDel, setConfirmDel]   = useState(null);
  const [password, setPassword]       = useState("");
  const [pwError, setPwError]         = useState("");
  const [showPwModal, setShowPwModal] = useState(false);
  const [saveMsg, setSaveMsg]         = useState("");

  // Guardar en localStorage cada vez que cambian los datos
  useEffect(() => { save("edid_resources", resources); }, [resources]);
  useEffect(() => { save("edid_generalTags", generalTagDefs); }, [generalTagDefs]);
  useEffect(() => { save("edid_specificTags", specificTagPool); }, [specificTagPool]);

  const usedSpecificTags = [...new Set(resources.flatMap(r => r.specificTags))].sort();

  const filtered = resources.filter(r => {
    const q = search.toLowerCase().trim();
    const mSearch = !q || r.title.toLowerCase().includes(q) || r.description.toLowerCase().includes(q) || r.specificTags.some(t=>t.includes(q)) || r.codigo.toLowerCase().includes(q);
    const mGen = !filterGeneral || r.generalTags.includes(filterGeneral);
    const mSpec = filterSpecific.length===0 || filterSpecific.every(t=>r.specificTags.includes(t));
    return mSearch && mGen && mSpec;
  });

  const toggleSpecFilter = tag => setFilterSpecific(p => p.includes(tag) ? p.filter(t=>t!==tag) : [...p, tag]);
  const clearAll = () => { setSearch(""); setFilterGeneral(null); setFilterSpecific([]); };

  const handleSave = data => {
    const newTags = data.specificTags.filter(t => !specificTagPool.includes(t));
    if(newTags.length > 0) setSpecificTagPool(p => [...p, ...newTags].sort());
    if(editingRes) { setResources(p => p.map(r => r.id===editingRes.id ? {...r,...data} : r)); setEditingRes(null); }
    else { setResources(p => [{id:Date.now(), ...data, createdAt: new Date().toISOString().split("T")[0]}, ...p]); }
    setShowForm(false);
    setSaveMsg("✓ Guardado"); setTimeout(() => setSaveMsg(""), 2500);
  };

  const handleDelete = id => { setResources(p => p.filter(r=>r.id!==id)); setConfirmDel(null); };

  const handleLogin = () => {
    if(password === MANAGER_PASSWORD) { setIsManager(true); setShowPwModal(false); setPassword(""); setPwError(""); }
    else setPwError("Contraseña incorrecta.");
  };

  // Exportar JSON de backup
  const exportData = () => {
    const data = { resources, generalTagDefs, specificTagPool };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "recursario_backup.json"; a.click();
  };

  // Exportar HTML completo con todos los datos embebidos
  const exportHTML = () => {
    fetch(window.location.href)
      .then(r => r.text())
      .then(html => {
        const rJson = JSON.stringify(resources);
        const gJson = JSON.stringify(generalTagDefs);
        const sJson = JSON.stringify(specificTagPool);
        const newHtml = html
          .replace(/const DEFAULT_GENERAL_TAGS = \[[\s\S]*?\];/, "const DEFAULT_GENERAL_TAGS = " + gJson + ";")
          .replace(/const DEFAULT_SPECIFIC_TAGS = \[[\s\S]*?\];/, "const DEFAULT_SPECIFIC_TAGS = " + sJson + ";")
          .replace(/const DEFAULT_RESOURCES = \[[\s\S]*?\];/, "const DEFAULT_RESOURCES = " + rJson + ";");
        const blob = new Blob([newHtml], {type:"text/html;charset=utf-8"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "index.html";
        a.click();
        setSaveMsg("✓ HTML exportado"); setTimeout(() => setSaveMsg(""), 3000);
      })
      .catch(() => setSaveMsg("❌ Error al exportar"));
  };

  const hasFilters = search || filterGeneral || filterSpecific.length > 0;

  return (
    <div style={{ minHeight:"100vh", background:"#f0f4f9" }}>

      {/* HEADER */}
      <header style={{ background:"#0f1e3c", borderBottom:"3px solid #2563eb", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ maxWidth:940, margin:"0 auto", padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:20 }}>📋</span>
              <h1 style={{ margin:0, fontSize:18, fontWeight:800, color:"#fff", letterSpacing:"-0.02em" }}>Recursario Interno</h1>
              <span style={{ fontSize:11, background:"#1e3a5f", color:"#93c5fd", padding:"2px 9px", borderRadius:20, fontWeight:700 }}>EDID · MPF</span>
            </div>
            <p style={{ margin:"2px 0 0 28px", fontSize:11, color:"#64748b", fontStyle:"italic" }}>Asistencia a víctimas · Uso interno del equipo</p>
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
            {saveMsg && <span style={{ fontSize:12, color:"#86efac", fontWeight:700 }}>{saveMsg}</span>}
            {isManager ? (
              <>
                <button onClick={() => setShowTagMgr(true)} style={{ padding:"5px 11px", borderRadius:8, border:"1px solid #334155", background:"transparent", color:"#7dd3fc", cursor:"pointer", fontSize:12, fontWeight:600 }}>🏷️ Etiquetas</button>
                <button onClick={exportData} style={{ padding:"5px 11px", borderRadius:8, border:"1px solid #334155", background:"transparent", color:"#86efac", cursor:"pointer", fontSize:12, fontWeight:600 }}>💾 Backup JSON</button>
                <button onClick={exportHTML} style={{ padding:"5px 11px", borderRadius:8, border:"1px solid #2563eb", background:"#2563eb", color:"#fff", cursor:"pointer", fontSize:12, fontWeight:700 }}>⬇️ Exportar HTML</button>
                <span style={{ fontSize:11, background:"#1e3a5f", padding:"3px 10px", borderRadius:20, color:"#86efac", fontWeight:700 }}>✓ Manager</span>
                <button onClick={() => { setIsManager(false); setShowForm(false); setEditingRes(null); }} style={{ padding:"5px 11px", borderRadius:8, border:"1px solid #334155", background:"transparent", color:"#94a3b8", cursor:"pointer", fontSize:12 }}>Salir</button>
                <button onClick={() => { setEditingRes(null); setShowForm(true); window.scrollTo({top:0,behavior:"smooth"}); }} style={{ padding:"6px 14px", borderRadius:8, border:"none", background:"#2563eb", color:"#fff", cursor:"pointer", fontSize:13, fontWeight:700 }}>+ Nuevo recurso</button>
              </>
            ) : (
              <button onClick={() => setShowPwModal(true)} style={{ padding:"5px 13px", borderRadius:8, border:"1px solid #334155", background:"transparent", color:"#94a3b8", cursor:"pointer", fontSize:12 }}>🔑 Acceso manager</button>
            )}
          </div>
        </div>
      </header>

      {/* MAIN */}
      <main style={{ maxWidth:940, margin:"0 auto", padding:"16px 14px 60px" }}>

        {/* BUSCADOR */}
        <div style={{ background:"#fff", borderRadius:14, padding:"14px 16px", boxShadow:"0 1px 8px rgba(15,30,60,0.07)", marginBottom:14 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Buscar por nombre, código o palabra clave…"
            style={{ width:"100%", padding:"9px 14px", borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:13.5, color:"#0f1e3c", background:"#f8fafc", outline:"none" }}/>

          <div style={{ marginTop:12 }}>
            <p style={{ margin:"0 0 7px", fontSize:10.5, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.06em" }}>Categoría</p>
            <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
              {generalTagDefs.map(tag => {
                const active = filterGeneral === tag.id;
                return <button key={tag.id} onClick={() => setFilterGeneral(active ? null : tag.id)} style={{ padding:"5px 15px", borderRadius:999, fontSize:13, fontWeight:700, cursor:"pointer", border:`2px solid ${tag.color}`, background: active ? tag.color : "#fff", color: active ? "#fff" : tag.color, transition:"all 0.15s" }}>{tag.label}</button>;
              })}
            </div>
          </div>

          <div style={{ marginTop:11 }}>
            <p style={{ margin:"0 0 7px", fontSize:10.5, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.06em" }}>Etiqueta específica</p>
            <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
              {usedSpecificTags.map(tag => {
                const active = filterSpecific.includes(tag);
                return <span key={tag} onClick={() => toggleSpecFilter(tag)} style={{ padding:"3px 10px", borderRadius:999, fontSize:11.5, fontWeight:600, cursor:"pointer", userSelect:"none", background: active?"#1e3a5f":"#e2e8f0", color: active?"#fff":"#475569", border: active?"none":"1px solid #cbd5e1", transition:"all 0.15s" }}>{tag}</span>;
              })}
            </div>
          </div>

          {hasFilters && <button onClick={clearAll} style={{ marginTop:10, padding:"4px 13px", borderRadius:999, fontSize:12, fontWeight:700, border:"none", cursor:"pointer", background:"#fee2e2", color:"#dc2626" }}>✕ Limpiar filtros</button>}
        </div>

        {/* FORMULARIO */}
        {showForm && isManager && (
          <div style={{ background:"#fff", border:"2px solid #2563eb", borderRadius:14, padding:"20px", marginBottom:16, boxShadow:"0 4px 20px rgba(37,99,235,0.1)" }}>
            <h2 style={{ margin:"0 0 14px", fontSize:15.5, color:"#0f1e3c", fontWeight:800 }}>{editingRes ? "✏️ Editar recurso" : "➕ Nuevo recurso"}</h2>
            <ResourceForm initial={editingRes} onSave={handleSave} onCancel={() => {setShowForm(false); setEditingRes(null);}} generalTagDefs={generalTagDefs} specificTagPool={specificTagPool}/>
          </div>
        )}

        <p style={{ margin:"0 0 10px", fontSize:12, color:"#64748b", fontWeight:600 }}>
          {filtered.length === resources.length ? `${resources.length} recursos` : `${filtered.length} de ${resources.length} recursos`}
          {hasFilters && " · filtros activos"}
        </p>

        {filtered.length === 0 ? (
          <div style={{ textAlign:"center", padding:"50px 0", color:"#94a3b8" }}>
            <div style={{ fontSize:38, marginBottom:8 }}>🔎</div>
            <p style={{ margin:0, fontSize:14.5 }}>No hay recursos con esos criterios.</p>
            <button onClick={clearAll} style={{ marginTop:12, padding:"7px 18px", borderRadius:9, border:"none", background:"#1e3a5f", color:"#fff", cursor:"pointer", fontSize:13 }}>Limpiar búsqueda</button>
          </div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {filtered.map(r => <ResourceCard key={r.id} r={r} generalTagDefs={generalTagDefs} isManager={isManager} onEdit={res=>{setEditingRes(res);setShowForm(true);window.scrollTo({top:0,behavior:"smooth"});}} onDelete={id=>setConfirmDel(id)}/>)}
          </div>
        )}
      </main>

      {/* MODAL: Gestión de etiquetas */}
      {showTagMgr && <Modal onClose={() => setShowTagMgr(false)} wide><h3 style={{ margin:"0 0 16px", color:"#0f1e3c", fontSize:17, fontWeight:800 }}>🏷️ Gestionar etiquetas</h3><TagManager generalTagDefs={generalTagDefs} setGeneralTagDefs={setGeneralTagDefs} specificTagPool={specificTagPool} setSpecificTagPool={setSpecificTagPool} onClose={() => setShowTagMgr(false)}/></Modal>}

      {/* MODAL: Confirmar eliminación */}
      {confirmDel && <Modal onClose={() => setConfirmDel(null)}><h3 style={{ margin:"0 0 8px", color:"#0f1e3c" }}>¿Eliminar este recurso?</h3><p style={{ margin:"0 0 18px", fontSize:13.5, color:"#64748b" }}>Esta acción no se puede deshacer.</p><div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}><button onClick={() => setConfirmDel(null)} style={{ padding:"7px 16px", borderRadius:9, border:"1.5px solid #e2e8f0", background:"#fff", color:"#475569", cursor:"pointer", fontSize:13.5 }}>Cancelar</button><button onClick={() => handleDelete(confirmDel)} style={{ padding:"7px 16px", borderRadius:9, border:"none", background:"#dc2626", color:"#fff", cursor:"pointer", fontSize:13.5, fontWeight:700 }}>Eliminar</button></div></Modal>}

      {/* MODAL: Contraseña */}
      {showPwModal && (
        <Modal onClose={() => {setShowPwModal(false); setPassword(""); setPwError("");}}>
          <h3 style={{ margin:"0 0 6px", color:"#0f1e3c" }}>🔑 Acceso Manager</h3>
          <p style={{ margin:"0 0 14px", fontSize:13, color:"#64748b" }}>Ingresá la contraseña para cargar o editar recursos.</p>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="Contraseña" autoFocus
            style={{ width:"100%", padding:"9px 13px", borderRadius:9, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none" }}/>
          {pwError && <p style={{ color:"#dc2626", fontSize:13, margin:"6px 0 0" }}>{pwError}</p>}
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:14 }}>
            <button onClick={() => {setShowPwModal(false); setPassword(""); setPwError("");}} style={{ padding:"7px 16px", borderRadius:9, border:"1.5px solid #e2e8f0", background:"#fff", color:"#475569", cursor:"pointer", fontSize:13.5 }}>Cancelar</button>
            <button onClick={handleLogin} style={{ padding:"7px 16px", borderRadius:9, border:"none", background:"#1e3a5f", color:"#fff", cursor:"pointer", fontSize:13.5, fontWeight:700 }}>Ingresar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
